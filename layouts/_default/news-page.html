{{ define "main" }}
<div class="news-page">
    <div class="news-hero">
        <div class="container">
            <h1>News</h1>
            <p>The latest from IQSS — research highlights, program updates, and community stories.</p>
        </div>
    </div>

    <div class="news-content">
        <div class="container">
            <div class="news-count">{{ .Params.article_count }} articles</div>
            {{ .Content }}
        </div>
    </div>
</div>

<style>
.news-page { margin: 0; padding: 0; }

.news-hero {
    background: linear-gradient(135deg, #CC5500 0%, #B8460A 100%);
    color: white;
    padding: 60px 0;
}

.news-hero h1 {
    font-size: 48px;
    font-weight: 300;
    margin-bottom: 15px;
}

.news-hero p {
    font-size: 18px;
    opacity: 0.9;
    max-width: 600px;
}

.news-content {
    background: #f8f9fa;
    padding: 40px 0 60px;
}

.news-count {
    text-align: right;
    color: #666;
    font-size: 14px;
    margin-bottom: 20px;
}

.news-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    max-width: 1200px;
    margin: 0 auto;
}

.news-card {
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
}

.news-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.news-card-image {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #e9ecef;
}

.news-card-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    image-rendering: -webkit-optimize-contrast;
    background: #e9ecef;
}

.news-card-body {
    padding: 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
}

.news-card-date {
    font-size: 13px;
    color: #888;
    margin-bottom: 8px;
}

.news-card-title {
    font-size: 17px;
    font-weight: 600;
    color: #333;
    margin-bottom: 10px;
    line-height: 1.3;
}

.news-card:hover .news-card-title {
    color: #CC5500;
}

.news-card-desc {
    font-size: 14px;
    color: #666;
    line-height: 1.5;
    flex: 1;
}

@media (max-width: 768px) {
    .news-hero { padding: 40px 0; }
    .news-hero h1 { font-size: 32px; }
    .news-grid { grid-template-columns: 1fr; gap: 15px; padding: 0 15px; }
    .news-content { padding: 30px 0; }
}
</style>
{{ end }}
